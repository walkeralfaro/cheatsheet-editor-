<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cheatsheet Editor — crea hojas de atajos locales y privadas</title>
    <meta
      name="description"
      content="Crea cheatsheets de atajos de teclado, comandos y snippets en segundos. 100% local, sin inicio de sesión y privado: tus datos nunca salen de tu navegador."
    />
    <meta
      name="keywords"
      content="cheatsheet, atajos de teclado, shortcuts, hoja de comandos, snippets, editor local, sin registro, privado"
    />
    <link rel="canonical" href="https://cheatsheet.walkeralfaro.com/" />
    <meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cheatsheet Editor" />
    <meta
      property="og:title"
      content="Cheatsheet Editor — crea hojas de atajos locales y privadas"
    />
    <meta
      property="og:description"
      content="Crea cheatsheets de atajos, comandos y snippets en segundos. 100% local, sin login y privado."
    />
    <meta property="og:url" content="https://cheatsheet.walkeralfaro.com/" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Cheatsheet Editor — crea hojas de atajos locales y privadas"
    />
    <meta
      name="twitter:description"
      content="Crea cheatsheets de atajos, comandos y snippets en segundos. 100% local, sin login y privado."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("theme");
          if (theme !== "dark" && theme !== "light") {
            theme = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
            document.documentElement.style.backgroundColor = "#020617";
          } else {
            document.documentElement.style.backgroundColor = "#fafaf9";
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="min-h-screen bg-surface text-text font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
