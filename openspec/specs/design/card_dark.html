<div class="card">
    <div class="card-header green" data-cmd="Vim Modes" data-tip="Neovim has distinct modes for different tasks. Normal is default - navigate and issue commands. Switch with i/a/o (Insert), v/V/Ctrl+v (Visual), or : (Command). Always return to Normal with Esc.">Modes</div>
    <table>
      <tbody><tr data-tip="Enter Insert mode before the cursor position" data-example="i" data-current-cmd="i"><td>i<button class="edit-bind-btn" aria-label="Customize binding" title="Hover any command row, then click ✎ to customize">✎</button></td><td>Insert before cursor</td></tr>
      <tr data-tip="Enter Insert mode before the first non-blank character of the line" data-example="I" data-current-cmd="I"><td>I<button class="edit-bind-btn" aria-label="Customize binding" title="Hover any command row, then click ✎ to customize">✎</button></td><td>Insert at first non-blank</td></tr>
      <tr data-tip="Enter Insert mode after the cursor position" data-example="a" data-current-cmd="a"><td>a<button class="edit-bind-btn" aria-label="Customize binding" title="Hover any command row, then click ✎ to customize">✎</button></td><td>Insert after cursor</td></tr>
      <tr data-tip="Enter Insert mode at the end of the line" data-example="A" data-current-cmd="A"><td>A<button class="edit-bind-btn" aria-label="Customize binding" title="Hover any command row, then click ✎ to customize">✎</button></td><td>Insert at line end</td></tr>
      <tr data-tip="Open a new line below the current line and enter Insert mode" data-example="o" data-current-cmd="o"><td>o<button class="edit-bind-btn" aria-label="Customize binding" title="Hover any command row, then click ✎ to customize">✎</button></td><td>New line below, insert</td></tr>
      <tr data-tip="Open a new line above the current line and enter Insert mode" data-example="O" data-current-cmd="O"><td>O<button class="edit-bind-btn" aria-label="Customize binding" title="Hover any command row, then click ✎ to customize">✎</button></td><td>New line above, insert</td></tr>
      <tr data-tip="Enter Visual mode to select individual characters" data-example="v" data-current-cmd="v"><td>v<button class="edit-bind-btn" aria-label="Customize binding" title="Hover any command row, then click ✎ to customize">✎</button></td><td>Visual (character)</td></tr>
      <tr data-tip="Enter Visual Line mode to select entire lines" data-example="V" data-current-cmd="V"><td>V<button class="edit-bind-btn" aria-label="Customize binding" title="Hover any command row, then click ✎ to customize">✎</button></td><td>Visual (line)</td></tr>
      <tr data-tip="Enter Visual Block mode to select a rectangular region of text" data-example="Ctrl+v" data-current-cmd="Ctrl+v"><td>Ctrl+v<button class="edit-bind-btn" aria-label="Customize binding" title="Hover any command row, then click ✎ to customize">✎</button></td><td>Visual (block)</td></tr>
      <tr data-tip="Enter Command mode to type Ex commands like :w, :q, :s" data-example=":w" data-current-cmd=":"><td>:<button class="edit-bind-btn" aria-label="Customize binding" title="Hover any command row, then click ✎ to customize">✎</button></td><td>Command mode</td></tr>
      <tr data-tip="Return to Normal mode from Insert, Visual, or Command-line mode (Terminal mode uses Ctrl+\ Ctrl+N)" data-example="Esc" data-current-cmd="Esc / Ctrl+["><td>Esc / Ctrl+[<button class="edit-bind-btn" aria-label="Customize binding" title="Hover any command row, then click ✎ to customize">✎</button></td><td>Return to Normal</td></tr>
      <tr data-tip="Enter Replace mode - typed characters overwrite existing text character by character" data-example="R" data-current-cmd="R"><td>R<button class="edit-bind-btn" aria-label="Customize binding" title="Hover any command row, then click ✎ to customize">✎</button></td><td>Replace mode</td></tr>
    </tbody></table>
  </div>
